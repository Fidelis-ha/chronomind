# ChronoMind — Autonomous Programming Config
project_name: chronomind
project_dir: /opt/data/chronomind
vercel_token_file: /opt/data/.env.vercel
branch_prefix: fidelis
base_branch: main
telegram_chat_id: "58614728"

# Quality Gate
quality_gate:
  lint_command: npm run lint
  typecheck_command: npx tsc --noEmit
  build_command: npm run build
  smoke_test_urls: / /sign-in /sign-up /settings
  smoke_test_expected_status_/: 307
  smoke_test_expected_status_signin: 200
  smoke_test_expected_status_signup: 200
  smoke_test_expected_status_settings: 200

allowed_toolsets:
  - terminal
  - file
  - browser

# Git Push Target — Fidelis-ha Fork (kein Write auf MarcWalter)
git_push_target: git@github.com:Fidelis-ha/chronomind.git

subagent_model: minimax-m2.7
subagent_provider: minimax
